name: Nightly Lighthouse Report

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC = 04:00 Paris summer time
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start app
        run: |
          npm run frontend:dev &
          npx wait-on http://localhost:5173

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --collect.url=http://localhost:5173 --upload.target=filesystem --upload.outputDir=./lhci-report

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: ./lhci-report